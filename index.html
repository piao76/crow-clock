<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五鳥占卜指針時鐘 - 專業 RWD 版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        
        .main-container {
            width: 100%;
            max-width: 400px; /* 電腦端最大寬度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 明/暗半月切換 */
        .paksha-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .paksha-btn {
            flex: 1;
            background-color: rgba(38, 38, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 5px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .paksha-btn.active {
            background-color: #ffffff;
            color: #000;
        }

        /* 五鳥切換 - 響應式：手機端會自動換行或縮小 */
        .bird-selector {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background-color: rgba(38, 38, 38, 0.6);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bird-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 5px;
            flex: 1;
            border-radius: 20px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .bird-btn.active {
            background-color: #d4af37;
            color: #000;
        }
        
        /* 💡 RWD 時鐘外殼：手機看是螢幕寬度的 75%，電腦看最大 320px */
        .clock {
            width: 75vw;
            height: 75vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 50%;
            background-color: rgba(38, 38, 38, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 10px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .color-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            opacity: 0.25;
            z-index: 1;
            transition: background-color 0.8s ease;
        }
        
        .inner-face {
            position: absolute;
            width: 85%;
            height: 85%;
            background-color: #262626;
            border-radius: 50%;
            z-index: 2;
        }

        .number-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            z-index: 3;
        }
        .number {
            position: absolute;
            top: 6%;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            width: 30px;
            text-align: center;
        }

        .center-nut { width: 10px; height: 10px; background-color: #fff; border-radius: 50%; position: absolute; z-index: 10; }
        
        /* 指針樣式 */
        .hand { position: absolute; bottom: 50%; transform-origin: bottom; border-radius: 5px; z-index: 5; }
        .hour-hand { width: 6px; height: 18%; background-color: #ffffff; transition: transform 0.5s ease-in-out; }
        .min-hand { width: 4px; height: 28%; background-color: #cccccc; transition: transform 0.5s ease-in-out; }
        .sec-hand { width: 2px; height: 35%; background-color: #e74c3c; transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44); }

        /* 下方資訊面板 */
        .info-panel {
            background-color: rgba(38, 38, 38, 0.4);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: clamp(16px, 4.5vw, 20px); /* 💡 字體隨螢幕縮放 */
            font-weight: bold;
            margin: 10px 0;
            transition: 0.3s;
        }
        .advice {
            font-size: clamp(12px, 3.5vw, 14px);
            color: #aaa;
            line-height: 1.5;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 狀態顏色庫 */
        .status-統治 { background-color: #d4af37; color: #000; }
        .status-進食 { background-color: #2ecc71; color: #fff; }
        .status-行走 { background-color: #3498db; color: #fff; }
        .status-睡眠 { background-color: #8e44ad; color: #fff; }
        .status-死亡 { background-color: #e74c3c; color: #fff; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 半月切換 -->
        <div class="paksha-selector">
            <button class="paksha-btn active" id="shukla-btn" onclick="switchPaksha('明半月')">明半月 (Shukla)</button>
            <button class="paksha-btn" id="krishna-btn" onclick="switchPaksha('暗半月')">暗半月 (Krishna)</button>
        </div>

        <!-- 五鳥切換 -->
        <div class="bird-selector">
            <button class="bird-btn" onclick="switchBird(0)">禿鷹</button>
            <button class="bird-btn" onclick="switchBird(1)">貓頭鷹</button>
            <button class="bird-btn active" id="default-btn" onclick="switchBird(2)">烏鴉</button>
            <button class="bird-btn" onclick="switchBird(3)">公雞</button>
            <button class="bird-btn" onclick="switchBird(4)">孔雀</button>
        </div>

        <!-- 時鐘 -->
        <div class="clock" id="clock">
            <div class="color-ring" id="color-ring"></div>
            <div class="inner-face"></div>
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
            <div class="center-nut"></div>
        </div>

        <!-- 面板 -->
        <div class="info-panel">
            <div style="color:#888; font-size:11px; letter-spacing:1px; margin-bottom: 5px;" id="panel-title">🐦 PANCHAPAKSHI</div>
            <div id="yama-time" style="font-size: 11px; color: #d4af37; margin-bottom: 5px;"></div>
            <div class="status-badge" id="status-display">計算中...</div>
            <div class="advice" id="advice-display">載入邏輯中...</div>
        </div>
    </div>

<script>
    // --- 專業數據 ---
    const BIRDS = ["禿鷹", "貓頭鷹", "烏鴉", "公雞", "孔雀"];
    const ACTIVITIES = ["進食", "行走", "統治", "睡眠", "死亡"];
    const COLORS = { "進食": "#2ecc71", "行走": "#3498db", "統治": "#d4af37", "睡眠": "#8e44ad", "死亡": "#e74c3c" };
    const ADVICE = { "統治": "🌟 大吉！能量巔峰，最適合決策、面試與出擊！", "進食": "💪 次吉！體力回補中，適合學習、進食、規劃。", "行走": "🚶 普通！能量平穩，適合一般庶務、通勤與例行公事。", "睡眠": "💤 沉靜！能量低迷，建議冥想放鬆，避免重大合約。", "死亡": "⚠️ 凶！能量最低點，易疲勞出錯，請安靜守成。" };

    const DAY_ORDER = { "明半月": [0, 1, 2, 3, 4, 0, 1], "暗半月": [2, 3, 4, 0, 1, 2, 3] };
    const NIGHT_ORDER = { "明半月": [2, 4, 1, 3, 0, 2, 4], "暗半月": [1, 4, 3, 2, 0, 1, 4] };

    let currentPaksha = "明半月";
    let myBirdIndex = 2; // 預設烏鴉
    const sunriseH = 5, sunriseM = 25;
    const sunsetH = 18, sunsetM = 25;

    // 初始化 12 數字
    const clockEl = document.getElementById('clock');
    for (let i = 1; i <= 12; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'number-wrapper';
        wrapper.style.transform = `rotate(${i * 30}deg)`;
        const num = document.createElement('div');
        num.className = 'number';
        num.innerText = i;
        num.style.transform = `rotate(-${i * 30}deg)`;
        wrapper.appendChild(num);
        clockEl.appendChild(wrapper);
    }

    function update() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // 💡 核心修正：累計角度防抖 (避免 12 點跳回 0)
        const totalSecondsInDay = (h * 3600) + (m * 60) + s;
        const secDeg = totalSecondsInDay * 6;
        const minDeg = (totalSecondsInDay / 10); // 每 10 秒走 1 度
        const hourDeg = (totalSecondsInDay / 120); // 每 2 分鐘走 1 度

        document.getElementById('sec-hand').style.transform = `rotate(${secDeg}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${minDeg}deg)`;
        document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;

        // --- 占卜計算 ---
        const sunrise = new Date(now); sunrise.setHours(sunriseH, sunriseM, 0);
        const sunset = new Date(now); sunset.setHours(sunsetH, sunsetM, 0);
        
        let weekday = now.getDay();
        if (now < sunrise) weekday = (weekday + 6) % 7; // 換日邏輯

        let isDay = now >= sunrise && now < sunset;
        let yamaIdx = 0;
        if (isDay) {
            let dayLen = (sunset - sunrise) / 5;
            yamaIdx = Math.floor((now - sunrise) / dayLen);
        } else {
            let nextSunrise = new Date(sunrise);
            if (now >= sunset) nextSunrise.setDate(nextSunrise.getDate() + 1);
            let nightLen = (nextSunrise - sunset) / 5;
            let elapsed = (now >= sunset) ? (now - sunset) : (now - sunset + 86400000);
            yamaIdx = Math.floor(elapsed / nightLen);
        }
        yamaIdx = Math.min(Math.max(0, yamaIdx), 4);

        const startBirdOrder = isDay ? DAY_ORDER[currentPaksha][weekday] : NIGHT_ORDER[currentPaksha][weekday];
        const rulingBird = (startBirdOrder + yamaIdx) % 5;
        
        let activityIdx;
        if (currentPaksha === "明半月") {
            activityIdx = (myBirdIndex - rulingBird + 5) % 5;
        } else {
            const krishnaCycle = [4, 3, 2, 1, 0];
            activityIdx = krishnaCycle[(myBirdIndex - rulingBird + 5) % 5];
        }

        const status = ACTIVITIES[activityIdx];
        
        // 更新 UI 文字
        document.getElementById('panel-title').innerText = `🐦 PANCHAPAKSHI (${currentPaksha} - ${BIRDS[myBirdIndex]})`;
        document.getElementById('yama-time').innerText = `目前處於：${isDay?'日間':'夜間'} 第 ${yamaIdx + 1} 時段 (Yama)`;
        const badge = document.getElementById('status-display');
        badge.innerText = `${BIRDS[myBirdIndex]}：${status}`;
        badge.className = `status-badge status-${status}`;
        document.getElementById('advice-display').innerText = ADVICE[status];
        document.getElementById('color-ring').style.backgroundColor = COLORS[status];
    }

    function switchPaksha(p) {
        currentPaksha = p;
        document.getElementById('shukla-btn').classList.toggle('active', p === '明半月');
        document.getElementById('krishna-btn').classList.toggle('active', p === '暗半月');
        update();
    }

    function switchBird(idx) {
        myBirdIndex = idx;
        const btns = document.querySelectorAll('.bird-btn');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
        update();
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
