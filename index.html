<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五鳥占卜指針時鐘 - 五鳥自由切換版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .main-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 💡 新增：五鳥切換按鈕區 */
        .bird-selector {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background-color: rgba(38, 38, 38, 0.6);
            padding: 8px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bird-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .bird-btn.active {
            background-color: #d4af37;
            color: #000;
        }
        
        /* 時鐘外殼 */
        .clock {
            width: 80vw;
            height: 80vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 50%;
            background-color: rgba(38, 38, 38, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 10px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .color-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #333;
            opacity: 0.25;
            z-index: 1;
            transition: background-color 0.5s ease;
        }
        
        .inner-face {
            position: absolute;
            width: 85%;
            height: 85%;
            background-color: #262626;
            border-radius: 50%;
            z-index: 2;
        }

        .number-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            z-index: 3;
        }
        .number {
            position: absolute;
            top: 6%;
            font-size: 16px;
            font-weight: bold;
            color: #aaa;
            width: 30px;
            text-align: center;
        }

        .center-nut {
            width: 12px;
            height: 12px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            transform-origin: bottom;
            border-radius: 5px;
            z-index: 5;
        }
        .hour-hand { width: 6px; height: 18%; background-color: #ffffff; }
        .min-hand { width: 4px; height: 30%; background-color: #cccccc; }
        .sec-hand { width: 2px; height: 36%; background-color: #e74c3c; border-radius: 0; }

        /* 下方資訊面板 */
        .info-panel {
            background-color: rgba(38, 38, 38, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 8px 8px 8px 16px;
            border-radius: 50px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            margin: 10px 0;
            background-color: #333;
        }
        .advice {
            font-size: clamp(12px, 3.5vw, 14px);
            color: #aaa;
            line-height: 1.5;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
        }
        
        /* 狀態顏色庫 */
        .status-統治 { background-color: #d4af37; color: #000; }
        .status-進食 { background-color: #2ecc71; color: #fff; }
        .status-行走 { background-color: #3498db; color: #fff; }
        .status-睡眠 { background-color: #8e44ad; color: #fff; }
        .status-死亡 { background-color: #e74c3c; color: #fff; }
        .status-夜晚 { background-color: #2c3e50; color: #fff; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 💡 新增：五鳥切換 UI -->
        <div class="bird-selector">
            <button class="bird-btn" onclick="switchBird('禿鷹')">禿鷹</button>
            <button class="bird-btn" onclick="switchBird('貓頭鷹')">貓頭鷹</button>
            <button class="bird-btn active" id="default-btn" onclick="switchBird('烏鴉')">烏鴉</button>
            <button class="bird-btn" onclick="switchBird('公雞')">公雞</button>
            <button class="bird-btn" onclick="switchBird('孔雀')">孔雀</button>
        </div>

        <!-- 指針時鐘本體 -->
        <div class="clock" id="clock">
            <div class="color-ring" id="color-ring"></div>
            <div class="inner-face"></div>
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
            <div class="center-nut"></div>
        </div>

        <!-- 下方數據顯示 -->
        <div class="info-panel">
            <div style="color:#888; font-size:12px; letter-spacing:1px;" id="panel-title">🐦 PANCHAPAKSHI (明半月 - 烏鴉)</div>
            <div class="status-badge status-夜晚" id="status-display">載入中...</div>
            <div class="advice" id="advice-display">載入中...</div>
        </div>
    </div>

    <script>
        const clockElement = document.getElementById('clock');

        // 建立 12 數字旋轉容器
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'number-wrapper';
            wrapper.style.transform = `rotate(${i * 30}deg)`;
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            num.style.transform = `rotate(-${i * 30}deg)`;
            wrapper.appendChild(num);
            clockElement.appendChild(wrapper);
        }

        // 💡 核心改動：印度占卜明半月五鳥完整矩陣規則
        const allBirdsRoutines = {
            "禿鷹": {
                0: ["統治", "睡眠", "死亡", "進食", "行走"], 1: ["統治", "睡眠", "死亡", "進食", "行走"],
                2: ["睡眠", "死亡", "進食", "行走", "統治"], 3: ["死亡", "進食", "行走", "統治", "睡眠"],
                4: ["進食", "行走", "統治", "睡眠", "死亡"], 5: ["進食", "行走", "統治", "睡眠", "死亡"], 
                6: ["行走", "統治", "睡眠", "死亡", "進食"]
            },
            "貓頭鷹": {
                0: ["行走", "統治", "睡眠", "死亡", "進食"], 1: ["行走", "統治", "睡眠", "死亡", "進食"],
                2: ["統治", "睡眠", "死亡", "進食", "行走"], 3: ["睡眠", "死亡", "進食", "行走", "統治"],
                4: ["死亡", "進食", "行走", "統治", "睡眠"], 5: ["死亡", "進食", "行走", "統治", "睡眠"],
                6: ["進食", "行走", "統治", "睡眠", "死亡"]
            },
            "烏鴉": {
                0: ["進食", "行走", "統治", "睡眠", "死亡"], 1: ["進食", "行走", "統治", "睡眠", "死亡"],
                2: ["行走", "統治", "睡眠", "死亡", "進食"], 3: ["統治", "睡眠", "死亡", "進食", "行走"],
                4: ["睡眠", "死亡", "進食", "行走", "統治"], 5: ["睡眠", "死亡", "進食", "行走", "統治"],
                6: ["死亡", "進食", "行走", "統治", "睡眠"]
            },
            "公雞": {
                0: ["睡眠", "死亡", "進食", "行走", "統治"], 1: ["睡眠", "死亡", "進食", "行走", "統治"],
                2: ["死亡", "進食", "行走", "統治", "睡眠"], 3: ["進食", "行走", "統治", "睡眠", "死亡"],
                4: ["行走", "統治", "睡眠", "死亡", "進食"], 5: ["行走", "統治", "睡眠", "死亡", "進食"],
                6: ["統治", "睡眠", "死亡", "進食", "行走"]
            },
            "孔雀": {
                0: ["死亡", "進食", "行走", "統治", "睡眠"], 1: ["死亡", "進食", "行走", "統治", "睡眠"],
                2: ["進食", "行走", "統治", "睡眠", "死亡"], 3: ["行走", "統治", "睡眠", "死亡", "進食"],
                4: ["統治", "睡眠", "死亡", "進食", "行走"], 5: ["統治", "睡眠", "死亡", "進食", "行走"],
                6: ["睡眠", "死亡", "進食", "行走", "統治"]
            }
        };

        const adviceMap = {
            "統治": "🌟 大吉！能量處於顛峰，最適合決策與出擊！",
            "進食": "💪 次吉！體能與思維回補，適合進食與學習。",
            "行走": "🚶 普通！能量平穩，適合處理日常通勤與庶務。",
            "睡眠": "💤 沉靜！能量低沉，不宜重大決定，適合休息。",
            "死亡": "⚠️ 凶！能量最低點，請放鬆心情，避免衝突。",
            "夜晚": "🌙 夜晚時段！請沉靜休息、恢復元氣。"
        };
        const colorMap = { "統治": "#d4af37", "進食": "#2ecc71", "行走": "#3498db", "睡眠": "#8e44ad", "死亡": "#e74c3c", "夜晚": "#2c3e50" };

        let currentBird = "烏鴉"; // 預設烏鴉
        const sunriseHour = 5, sunriseMin = 25;
        const sunsetHour = 18, sunsetMin = 25;

        // 💡 點擊切換鳥兒的函數
        function switchBird(birdName) {
            currentBird = birdName;
            document.getElementById('panel-title').innerText = `🐦 PANCHAPAKSHI (明半月 - ${birdName})`;
            
            // 更新按鈕樣式
            document.querySelectorAll('.bird-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === birdName) btn.classList.add('active');
            });
            updateClock(); // 立即重新演算
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // 指針標準時間
            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minDeg = minutes * 6 + seconds * 0.1; 
            const secDeg = seconds * 6; 

            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;
            document.getElementById('min-hand').style.transform = `rotate(${minDeg}deg)`;
            document.getElementById('sec-hand').style.transform = `rotate(${secDeg}deg)`;

            const sunrise = new Date(now); sunrise.setHours(sunriseHour, sunriseMin, 0, 0);
            const sunset = new Date(now); sunset.setHours(sunsetHour, sunsetMin, 0, 0);

            const statusDisplay = document.getElementById("status-display");
            const adviceDisplay = document.getElementById("advice-display");
            const colorRing = document.getElementById("color-ring");

            if (now >= sunrise && now < sunset) {
                const dayLength = (sunset - sunrise) / 1000;
                const elapsedSeconds = (now - sunrise) / 1000;
                
                let yamaIndex = Math.floor(elapsedSeconds / (dayLength / 5));
                yamaIndex = Math.min(Math.max(0, yamaIndex), 4);

                const weekday = now.getDay();
                
                // 💡 依據當前選中的鳥，調用正確的陣列
                const currentStatus = allBirdsRoutines[currentBird][weekday][yamaIndex];

                statusDisplay.className = `status-badge status-${currentStatus}`;
                statusDisplay.innerText = `${currentBird}正在【${currentStatus}】`;
                adviceDisplay.innerText = adviceMap[currentStatus];
                
                colorRing.style.backgroundColor = colorMap[currentStatus];
                colorRing.style.opacity = "0.25";
            } else {
                statusDisplay.className = "status-badge status-夜晚";
                statusDisplay.innerText = `${currentBird}正在【夜晚休息】`;
                adviceDisplay.innerText = adviceMap["夜晚"];
                colorRing.style.backgroundColor = colorMap["夜晚"];
                colorRing.style.opacity = "0.2";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
