<html lang="zh-TW">
<head>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .main-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 💡 新增：明/暗半月切換按鈕區 */
        .paksha-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .paksha-btn {
            background-color: rgba(38, 38, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .paksha-btn.active {
            background-color: #ffffff;
            color: #000;
            border-color: #ffffff;
        }

        /* 五鳥切換按鈕區 */
        .bird-selector {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background-color: rgba(38, 38, 38, 0.6);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bird-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .bird-btn.active {
            background-color: #d4af37;
            color: #000;
        }
        
        /* 時鐘外殼 */
        .clock {
            width: 75vw;
            height: 75vw;
            max-width: 300px;
            max-height: 300px;
            border-radius: 50%;
            background-color: rgba(38, 38, 38, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 10px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .color-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            opacity: 0.25;
            z-index: 1;
            transition: background-color 0.5s ease;
        }
        
        .inner-face {
            position: absolute;
            width: 85%;
            height: 85%;
            background-color: #262626;
            border-radius: 50%;
            z-index: 2;
        }

        .number-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            z-index: 3;
        }
        .number {
            position: absolute;
            top: 6%;
            font-size: 15px;
            font-weight: bold;
            color: #aaa;
            width: 30px;
            text-align: center;
        }

        .center-nut { width: 12px; height: 12px; background-color: #fff; border-radius: 50%; position: absolute; z-index: 10; }
        .hand { position: absolute; bottom: 50%; transform-origin: bottom; border-radius: 5px; z-index: 5; }
        .hour-hand { width: 6px; height: 18%; background-color: #ffffff; }
        .min-hand { width: 4px; height: 30%; background-color: #cccccc; }
        .sec-hand { width: 2px; height: 36%; background-color: #e74c3c; border-radius: 0; }

        /* 下方資訊面板 */
        .info-panel {
            background-color: rgba(38, 38, 38, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 8px 12px 8px 16px;
            border-radius: 50px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            margin: 8px 0;
            background-color: #333;
        }
        .advice {
            font-size: clamp(12px, 3.5vw, 14px);
            color: #aaa;
            line-height: 1.5;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;

        .status-睡眠 { background-color: #8e44ad; color: #fff; }
        .status-死亡 { background-color: #e74c3c; color: #fff; }
    </style>

        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // 指針標準時間
            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minDeg = minutes * 6 + seconds * 0.1; 
            const secDeg = seconds * 6; 

            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;
            document.getElementById('min-hand').style.transform = `rotate(${minDeg}deg)`;
            document.getElementById('sec-hand').style.transform = `rotate(${secDeg}deg)`;

            const sunrise = new Date(now); sunrise.setHours(sunriseHour, sunriseMin, 0, 0);
            const sunset = new Date(now); sunset.setHours(sunsetHour, sunsetMin, 0, 0);

            const statusDisplay = document.getElementById("status-display");
            const adviceDisplay = document.getElementById("advice-display");
            const colorRing = document.getElementById("color-ring");
            
            document.getElementById('panel-title').innerText = `🐦 PANCHAPAKSHI (${currentPaksha} - ${currentBird})`;
            
            const weekday = now.getDay();
            let currentStatus = "";

            if (now >= sunrise && now < sunset) {
                // 白天時段 (05:25 ~ 18:25)
                const dayLength = (sunset - sunrise) / 1000;
                const elapsedSeconds = (now - sunrise) / 1000;
                let yamaIndex = Math.floor(elapsedSeconds / (dayLength / 5));
                yamaIndex = Math.min(Math.max(0, yamaIndex), 4);

                // 💡 調用對應半月、鳥兒與星期的白晝矩陣
                currentStatus = allPakshaRoutines[currentPaksha][currentBird]["day"][weekday][yamaIndex];
            } else {
                // 🌙 夜晚時段 (18:25 ~ 次日05:25)
                const nextSunrise = new Date(sunrise);
                nextSunrise.setDate(nextSunrise.getDate() + 1);
                
                let elapsedSeconds;
                let nightLength;
                
                if (now >= sunset) {
                    elapsedSeconds = (now - sunset) / 1000;
                    nightLength = (nextSunrise - sunset) / 1000;
                } else {
                    const prevSunset = new Date(sunset);
                    prevSunset.setDate(prevSunset.getDate() - 1);
                    elapsedSeconds = (now - prevSunset) / 1000;
                    nightLength = (sunrise - prevSunset) / 1000;
                }
                
                let yamaIndex = Math.floor(elapsedSeconds / (nightLength / 5));
                yamaIndex = Math.min(Math.max(0, yamaIndex), 4);

                // 💡 調用對應半月、鳥兒與星期的夜間矩陣
                currentStatus = allPakshaRoutines[currentPaksha][currentBird]["night"][weekday][yamaIndex];
            }

            // 更新顯示與顏色
            statusDisplay.className = `status-badge status-${currentStatus}`;
            statusDisplay.innerText = `${currentBird}正在【${currentStatus}】`;
            adviceDisplay.innerText = adviceMap[currentStatus];
            colorRing.style.backgroundColor = colorMap[currentStatus];
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
